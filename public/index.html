<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dólar Oficial BCRA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f1;
      --surface: #ffffff;
      --border: #e2ddd6;
      --accent: #a07840;
      --accent2: #2a9d8f;
      --text: #1a1814;
      --muted: #9a9088;
      --up: #2a9d8f;
      --down: #e03030;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.15;
    }

    .layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 56px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
      animation: fadeUp 0.6s ease both;
    }

    .header-left h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-left h1 em {
      color: var(--accent);
      font-style: italic;
    }

    .header-left .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .header-right {
      text-align: right;
    }

    .bcra-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 2px;
    }

    /* HERO VALUE CARD */
    .hero-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px 48px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .hero-card::before {
      content: 'USD';
      position: absolute;
      right: -10px;
      top: -20px;
      font-family: 'DM Serif Display', serif;
      font-size: 8rem;
      color: #ede9e2;
      pointer-events: none;
      user-select: none;
      letter-spacing: -0.05em;
    }

    .hero-card .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .hero-card .value-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hero-card .main-value {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 400;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .hero-card .currency-tag {
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .hero-card .fecha {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 16px;
      letter-spacing: 0.05em;
    }

    .hero-card .fecha span {
      color: var(--text);
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
    }

    .stat-card .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-card .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--text);
    }

    .stat-card .stat-value.up { color: var(--up); }
    .stat-card .stat-value.down { color: var(--down); }

    /* CHART SECTION */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px;
      animation: fadeUp 0.6s ease 0.3s both;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .chart-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--text);
    }

    .range-selector {
      display: flex;
      gap: 4px;
    }

    .range-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s ease;
    }

    .range-btn:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .range-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .chart-container {
      position: relative;
      height: 300px;
    }

    /* LOADING / ERROR STATES */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .error-msg {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--down);
      padding: 20px;
      text-align: center;
      letter-spacing: 0.05em;
    }

    /* FOOTER */
    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeUp 0.6s ease 0.4s both;
      flex-wrap: wrap;
      gap: 8px;
    }

    footer p {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--up);
      margin-right: 6px;
      animation: pulse 2s ease infinite;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .hero-card { padding: 28px 24px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <div class="header-left">
        <h1>Tipo de <em>Cambio</em></h1>
        <p class="subtitle">Estadísticas cambiarias · Banco Central · República Argentina</p>
      </div>
      <div class="header-right">
        <span class="bcra-badge">BCRA · API Pública</span>
      </div>
    </header>

    <!-- HERO VALUE -->
    <div class="hero-card" id="hero-card">
      <div class="loading"><div class="spinner"></div>Cargando cotización…</div>
    </div>

    <!-- STATS -->
    <div class="stats-row" id="stats-row" style="display:none;">
      <div class="stat-card">
        <div class="stat-label">Variación 30d</div>
        <div class="stat-value" id="var30"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Mínimo 1 año</div>
        <div class="stat-value" id="min1y"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Máximo 1 año</div>
        <div class="stat-value" id="max1y"></div>
      </div>
    </div>

    <!-- CHART -->
    <div class="chart-section">
      <div class="chart-header">
        <span class="chart-title">Dólar Oficial · Evolución histórica USD / ARS</span>
        <div class="range-selector" id="range-selector">
          <button class="range-btn" data-days="30">1M</button>
          <button class="range-btn" data-days="90">3M</button>
          <button class="range-btn" data-days="180">6M</button>
          <button class="range-btn active" data-days="365">1A</button>
          <button class="range-btn" data-days="730">2A</button>
        </div>
      </div>
      <div class="chart-container">
        <div class="loading" id="chart-loading"><div class="spinner"></div>Cargando serie histórica…</div>
        <canvas id="myChart" style="display:none;"></canvas>
      </div>
    </div>

    <footer>
      <p><span class="dot"></span>Datos en tiempo real · Fuente: BCRA</p>
      <p id="update-time"></p>
    </footer>
  </div>

  <script>
    // Llama a nuestra API serverless en /api/bcra (evita CORS y cert del BCRA)
    const API = '/api/bcra';

    let chartInstance = null;
    let allData       = [];
    let currentDays   = 365;

    // ─── Helpers ────────────────────────────────────────────────────────────────

    function fmt(n) {
      return new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
    }

    function dateStr(d) {
      return d.toISOString().split('T')[0];
    }

    function subtractDays(n) {
      const d = new Date();
      d.setDate(d.getDate() - n);
      return d;
    }

    // ─── Fetch helper ────────────────────────────────────────────────────────────

    async function fetchJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    // ─── Latest value ─────────────────────────────────────────────────────────────
    // Pedimos los últimos 7 días y tomamos el más reciente con valor > 0

    async function loadLatest() {
      try {
        const desde = dateStr(subtractDays(7));
        const hasta = dateStr(new Date());
        const data  = await fetchJSON(`${API}?variable=4&desde=${desde}&hasta=${hasta}`);

        // v4.0 devuelve: { results: [ { fecha, valor }, ... ] }
        const items = (data.results ?? [])
          .filter(r => r.valor > 0)
          .sort((a, b) => b.fecha.localeCompare(a.fecha));

        if (!items.length) throw new Error('Sin datos disponibles');
        const { fecha, valor } = items[0];

        document.getElementById('hero-card').innerHTML = `
          <div class="label">Dólar Oficial · Última cotización disponible · USD/ARS</div>
          <div class="value-row">
            <span class="main-value">$${fmt(valor)}</span>
            <span class="currency-tag">ARS por USD</span>
          </div>
          <p class="fecha">Último dato disponible: <span>${fecha}</span></p>
        `;
        return { valor, fecha };
      } catch (e) {
        document.getElementById('hero-card').innerHTML =
          `<div class="error-msg">Error al cargar cotización: ${e.message}</div>`;
        return null;
      }
    }

    // ─── Historical series ────────────────────────────────────────────────────────

    async function loadHistory(days) {
      document.getElementById('chart-loading').style.display = 'flex';
      document.getElementById('myChart').style.display = 'none';

      const desde = dateStr(subtractDays(days));
      const hasta = dateStr(new Date());

      try {
        const data  = await fetchJSON(`${API}?variable=4&desde=${desde}&hasta=${hasta}`);
        const items = data.results ?? [];

        if (!items.length) throw new Error('Sin datos en el rango solicitado');

        allData = items
          .map(r => ({ fecha: r.fecha, valor: r.valor }))
          .filter(r => r.valor > 0)
          .sort((a, b) => a.fecha.localeCompare(b.fecha));

        renderChart(allData);
        renderStats(allData);
        document.getElementById('update-time').textContent =
          `Actualizado: ${new Date().toLocaleTimeString('es-AR')}`;
      } catch (e) {
        document.getElementById('chart-loading').innerHTML =
          `<div class="error-msg">Error al cargar histórico: ${e.message}</div>`;
      }
    }

    // ─── Chart ───────────────────────────────────────────────────────────────────

    function renderChart(data) {
      document.getElementById('chart-loading').style.display = 'none';
      const canvas = document.getElementById('myChart');
      canvas.style.display = 'block';

      const labels = data.map(d => d.fecha);
      const values = data.map(d => d.valor);

      if (chartInstance) { chartInstance.destroy(); }

      const ctx = canvas.getContext('2d');

      // Gradient fill
      const grad = ctx.createLinearGradient(0, 0, 0, 300);
      grad.addColorStop(0, 'rgba(160, 120, 64, 0.18)');
      grad.addColorStop(1, 'rgba(160, 120, 64, 0)');

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'USD/ARS',
            data: values,
            borderColor: '#a07840',
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 4,
            pointHoverBackgroundColor: '#a07840',
            fill: true,
            backgroundColor: grad,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#ffffff',
              borderColor: '#e2ddd6',
              borderWidth: 1,
              titleColor: '#9a9088',
              bodyColor: '#1a1814',
              titleFont: { family: 'DM Mono', size: 10, weight: '400' },
              bodyFont: { family: 'DM Mono', size: 13, weight: '500' },
              padding: 12,
              callbacks: {
                title: items => items[0].label,
                label: item => `  $${fmt(item.raw)} ARS`,
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(200,195,188,0.5)', drawBorder: false },
              border: { display: false },
              ticks: {
                color: '#9a9088',
                font: { family: 'DM Mono', size: 10 },
                maxTicksLimit: 8,
                maxRotation: 0,
              }
            },
            y: {
              position: 'right',
              grid: { color: 'rgba(200,195,188,0.5)', drawBorder: false },
              border: { display: false },
              ticks: {
                color: '#9a9088',
                font: { family: 'DM Mono', size: 10 },
                callback: v => `$${fmt(v)}`,
              }
            }
          }
        }
      });
    }

    // ─── Stats ───────────────────────────────────────────────────────────────────

    function renderStats(data) {
      if (data.length < 2) return;

      const values = data.map(d => d.valor);
      const last    = values[values.length - 1];
      const prev30  = values.length >= 30 ? values[values.length - 30] : values[0];
      const min     = Math.min(...values);
      const max     = Math.max(...values);
      const pct     = ((last - prev30) / prev30) * 100;

      const var30El  = document.getElementById('var30');
      const sign     = pct >= 0 ? '+' : '';
      var30El.textContent = `${sign}${pct.toFixed(2)}%`;
      var30El.className   = `stat-value ${pct >= 0 ? 'up' : 'down'}`;

      document.getElementById('min1y').textContent = `$${fmt(min)}`;
      document.getElementById('max1y').textContent = `$${fmt(max)}`;
      document.getElementById('stats-row').style.display = 'grid';
    }

    // ─── Range selector ──────────────────────────────────────────────────────────

    document.getElementById('range-selector').addEventListener('click', e => {
      const btn = e.target.closest('.range-btn');
      if (!btn) return;
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentDays = parseInt(btn.dataset.days);
      loadHistory(currentDays);
    });

    // ─── Init ────────────────────────────────────────────────────────────────────

    (async () => {
      await loadLatest();
      await loadHistory(currentDays);
    })();
  </script>
</body>
</html>
